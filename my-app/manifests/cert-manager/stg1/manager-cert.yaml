# Kong Manager TLS Certificate — stg1 environment
#
# Exposed externally via OpenShift Route (TLS passthrough).
# Replace <APPS_DOMAIN> with your OpenShift wildcard apps domain.
#
# Secret:  kong-cp-stg1-np/kong-manager-tls
# Helm values:
#   admin_gui_ssl_cert:     /etc/secrets/kong-manager-tls/tls.crt
#   admin_gui_ssl_cert_key: /etc/secrets/kong-manager-tls/tls.key

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kong-manager-cert
  namespace: kong-cp-stg1-np
  labels:
    app.kubernetes.io/part-of: kong-gateway
    app.kubernetes.io/component: control-plane
    digitaldubai.ae/environment: stg1
spec:
  secretName: kong-manager-tls
  duration: 2160h    # 90 days
  renewBefore: 360h  # 15 days before expiry
  usages:
    - server auth
    - digital signature
    - key encipherment
  dnsNames:
    - inbox-gateway-console-a.stg.dubai.gov.ae
  issuerRef:
    name: kong-vault-issuer
    kind: ClusterIssuer
    group: cert-manager.io
