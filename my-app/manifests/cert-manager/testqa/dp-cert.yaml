# REFERENCE ONLY — non-stg1 configuration is intentionally disabled for MVP scope.
# Uncomment only when enabling this environment.
#
# # Kong DP Cluster Certificate — dev environment
# #
# # Used by the Data Plane for the cluster protocol (port 8005).
# # The DP presents this cert (client auth) when connecting to the CP.
# #
# # Secret:  kong-cp-testqa-np/kong-dp-cluster-cert  →  tls.crt  tls.key
# #
# # DP Helm values reference:
# #   cluster_cert:                /etc/secrets/kong-dp-cluster-cert/tls.crt
# #   cluster_cert_key:            /etc/secrets/kong-dp-cluster-cert/tls.key
# #   cluster_ca_cert:             /etc/secrets/kong-ca-bundle/ca.crt
#
# apiVersion: cert-manager.io/v1
# kind: Certificate
# metadata:
#   name: kong-dp-cluster-cert
#   namespace: kong-cp-testqa-np
#   labels:
#     app.kubernetes.io/part-of: kong-gateway
#     app.kubernetes.io/component: data-plane
#     digitaldubai.ae/environment: testqa
# spec:
#   secretName: kong-dp-cluster-cert
#   duration: 2160h    # 90 days
#   renewBefore: 360h  # 15 days before expiry
#   commonName: kong-dp-qa
#   isCA: false
#   subject:
#     organizations:
#       - dda-kong-gateway
#   privateKey:
#     algorithm: RSA
#     encoding: PKCS1
#     size: 2048
#   usages:
#     - client auth
#     - digital signature
#     - key encipherment
#   # No dnsNames: client auth certs are verified by CA chain, not hostname.
#   issuerRef:
#     name: kong-vault-issuer
#     kind: ClusterIssuer
#     group: cert-manager.io
