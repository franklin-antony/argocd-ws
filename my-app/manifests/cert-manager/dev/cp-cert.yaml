# #   cluster_cert_key: /etc/secrets/kong-cp-cluster-cert/tls.key
# #   cluster_ca_cert:  /etc/secrets/kong-ca-bundle/ca.crt
#
# apiVersion: cert-manager.io/v1
# kind: Certificate
# metadata:
#   name: kong-cp-cluster-cert
#   namespace: kong-cp-dev-np
