# OpenShift Route — Kong Admin API (stg1)
#
# TLS Passthrough: Kong terminates TLS directly. The Route hostname must match
# the dnsName in manifests/cert-manager/stg1/admin-cert.yaml and the
# admin_gui_api_url set in charts/kong-cp/stg1.yaml.
#
# Replace <APPS_DOMAIN> with your OpenShift wildcard apps domain.

apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kong-admin-stg1
  namespace: kong-cp-stg1-np
  labels:
    app.kubernetes.io/name: kong-admin-stg1
    app.kubernetes.io/part-of: dda-kong-gateway
    app.kubernetes.io/component: control-plane
    digitaldubai.ae/environment: stg1
spec:
  host: inbox-gateway-admin-a.stg.dubai.gov.ae
  to:
    kind: Service
    name: kong-cp-kong-admin
    weight: 100
  port:
    targetPort: 8444
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: None
  wildcardPolicy: None
