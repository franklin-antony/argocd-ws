# OpenShift Route — Kong Proxy (stg1)
#
# TLS Passthrough: Kong terminates TLS, enabling mTLS with upstreams,
# OIDC plugins, and SNI-based routing without double-proxy complexity.
#
# The Route hostname must match the dnsName in manifests/cert-manager/stg1/proxy-cert.yaml.
# Replace <APPS_DOMAIN> with your OpenShift wildcard apps domain.

apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kong-proxy-stg1
  namespace: kong-dp-stg1-np
  labels:
    app.kubernetes.io/name: kong-proxy-stg1
    app.kubernetes.io/part-of: dda-kong-gateway
    app.kubernetes.io/component: data-plane
    digitaldubai.ae/environment: stg1
spec:
  host: inbox-api-a.stg.dubai.gov.ae
  to:
    kind: Service
    name: kong-dp-kong-proxy
    weight: 100
  port:
    targetPort: 8443
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: None
  wildcardPolicy: None
