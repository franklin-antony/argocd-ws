# OpenShift Route — Kong Manager UI (stg1)
#
# TLS Passthrough: Kong terminates TLS directly. The Route hostname must match
# the dnsName in manifests/cert-manager/stg1/manager-cert.yaml and the
# admin_gui_url set in charts/kong-cp/stg1.yaml.
#
# Replace <APPS_DOMAIN> with your OpenShift wildcard apps domain.

apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kong-manager-stg1
  namespace: kong-cp-stg1-np
  labels:
    app.kubernetes.io/name: kong-manager-stg1
    app.kubernetes.io/part-of: dda-kong-gateway
    app.kubernetes.io/component: control-plane
    digitaldubai.ae/environment: stg1
spec:
  host: inbox-gateway-console-a.stg.dubai.gov.ae
  to:
    kind: Service
    name: kong-cp-kong-manager
    weight: 100
  port:
    targetPort: 8445
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: None
  wildcardPolicy: None
