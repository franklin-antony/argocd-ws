#
# # OpenShift Route — Kong Proxy (dev)
# #
# # TLS Passthrough: Kong terminates TLS, enabling mTLS with upstreams,
# # OIDC plugins, and SNI-based routing without double-proxy complexity.
# #
# # The Route hostname must match the dnsName in manifests/cert-manager/dev/proxy-cert.yaml.
# # Replace <APPS_DOMAIN> with your OpenShift wildcard apps domain.
#
# apiVersion: route.openshift.io/v1
# kind: Route
# metadata:
#   name: kong-proxy-testqa
#   namespace: kong-cp-testqa-np
#   labels:
#     app.kubernetes.io/name: kong-proxy-testqa
#     app.kubernetes.io/part-of: dda-kong-gateway
#     app.kubernetes.io/component: data-plane
#     digitaldubai.ae/environment: testqa
# spec:
#   host: kong-proxy-testqa.<APPS_DOMAIN>
#   to:
#     kind: Service
#     name: kong-dp-kong-proxy
#     weight: 100
#   port:
#     targetPort: 8443
#   tls:
#     termination: passthrough
#     insecureEdgeTerminationPolicy: None
#   wildcardPolicy: None
