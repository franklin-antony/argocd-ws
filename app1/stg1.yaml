# Kong Control Plane — stg1 (complete, self-contained)
# Read this file alone to understand exactly what deploys in kong-cp-stg1-np. No base required.
#
# SECRETS STRATEGY
# ─────────────────
# All sensitive values resolved at runtime via Kong's native HashiCorp Vault integration
# ({vault://hcv/...} references). Kong authenticates to Vault using the pod's Kubernetes
# service account (kong-cp-kong). No K8s Secrets required for application secrets.
#
# lua_ssl_trusted_certificate = "system" — uses CAs baked into the golden image OS trust
# store (Vault root CA + intermediate CA + Postgres CA via update-ca-trust). Covers Vault
# HTTPS, Postgres TLS, and any Lua cosocket connections.
#
# password — ONLY exception: RBAC super-admin bootstrap token. Must be a K8s Secret because
# it is needed during migration jobs before Kong's Lua/Vault runtime is initialised.
# Source: K8s Secret "kong-admin-bootstrap" (created by Day 0 from KONG_PASSWORD GitHub secret).
#
# cert-manager-issued TLS certs (CP cluster identity, Admin API, Manager) remain as K8s
# Secrets — issued by cert-manager, not stored in Vault KV.

kong:
  deployment:
    serviceAccount:
      automountServiceAccountToken: true

  ingressController:
    enabled: false

  image:
    repository: default-route-openshift-image-registry.<APPS_DOMAIN>/kong-images/kong-gateway
    tag: "2026.05.1-3.14.0.2-rhel-traceable-2.2.1-1-c55257e"

  # cert-manager-issued TLS identity certs must be file-mounted.
  secretVolumes:
    - kong-cp-cluster-cert   # cert-manager: CP mTLS identity cert+key
    - kong-admin-tls         # cert-manager: Admin API TLS cert+key
    - kong-manager-tls       # cert-manager: Kong Manager TLS cert+key

  env:
    role: control_plane
    database: postgres
    log_level: notice
    mem_cache_size: 128m
    incremental_sync: "on"

    # ── HashiCorp Vault connection ────────────────────────────────────────────
    # Enables {vault://hcv/...} references below. Kong authenticates to Vault
    # using the pod's Kubernetes service account (kong-cp-kong).
    # Prerequisite: infra-ops must create a Vault Kubernetes auth role named
    # "kong" bound to ServiceAccount kong-cp-kong in kong-cp-stg1-np with
    # read policy on secret/kong-gateway/*.
    #
    # Replace vault_hcv_host with your Vault FQDN or cluster DNS name.
    # Port 443 per blueprint §5.1.2. If your Vault uses a different port,
    # update vault_hcv_port here and in charts/kong-dp/stg1.yaml to match.
    vault_hcv_protocol: https
    vault_hcv_host: vault.vault.svc.cluster.local
    vault_hcv_port: "443"
    vault_hcv_auth_method: kubernetes
    vault_hcv_kube_role: kong
    vault_hcv_kv: "v2"
    vault_hcv_mount: secret
    vault_hcv_ttl: "3600"
    vault_hcv_neg_ttl: "300"

    # ── Postgres ──────────────────────────────────────────────────────────────
    # The Day 0 workflow substitutes pg_host with the actual VM hostname via the
    # postgres_host workflow input.
    pg_user: kong
    pg_host: "kong-db-rw.kong-db.svc.cluster.local"
    pg_ssl: "on"
    pg_ssl_verify: "on"
    pg_ssl_version: tlsv1_3
    pg_database: kong_stg1
    pg_password: "{vault://hcv/kong-gateway/stg1/db/password}"

    # ── Enterprise license and Manager session ───────────────────────────────
    license_data: "{vault://hcv/kong-gateway/license/license}"
    admin_gui_session_conf: "{vault://hcv/kong-gateway/session-config/admin_gui_session_conf}"

    # ── Kong super-admin bootstrap password ───────────────────────────────────────────────────────
    # Must be a K8s Secret — needed during migration jobs before Kong's Vault runtime is up.
    # Cannot be a {vault://...} reference: migration jobs run before nginx/Lua initialises.
    password:
      valueFrom:
        secretKeyRef:
          name: kong-admin-bootstrap
          key: password

    # ── CP↔DP mTLS cluster channel ────────────────────────────────────────────
    cluster_mtls: pki
    cluster_cert: /etc/secrets/kong-cp-cluster-cert/tls.crt
    cluster_cert_key: /etc/secrets/kong-cp-cluster-cert/tls.key
    cluster_ca_cert: "{vault://hcv/kong-gateway/pki/ca-combined/certificate}"
    lua_ssl_verify_depth: "5"
    lua_ssl_trusted_certificate: "system"
    cluster_listen: 0.0.0.0:8005 ssl
    cluster_telemetry_listen: 0.0.0.0:8006 ssl
    cluster_server_name: kong-cp-kong-cluster.kong-cp-stg1-np.svc.cluster.local

    # ── Admin API and Manager TLS ─────────────────────────────────────────────
    admin_ssl_cert: /etc/secrets/kong-admin-tls/tls.crt
    admin_ssl_cert_key: /etc/secrets/kong-admin-tls/tls.key
    admin_gui_ssl_cert: /etc/secrets/kong-manager-tls/tls.crt
    admin_gui_ssl_cert_key: /etc/secrets/kong-manager-tls/tls.key
    admin_gui_url: https://inbox-gateway-console-a.stg.dubai.gov.ae
    admin_gui_api_url: https://inbox-gateway-admin-a.stg.dubai.gov.ae

  enterprise:
    enabled: true
    rbac:
      enabled: true
      # ── Kong Manager authentication — IBM SSO OIDC ───────────────────────
      # blueprint §6.1 / 01-prerequisites.md item 41
      #
      # OIDC config is resolved at runtime from Vault. Seed the secret before
      # deploying — use the JSON template in 01-prerequisites.md Appendix B:
      #
      #   vault kv put secret/kong-gateway/idp-conf \
      #     admin_gui_auth_conf='{ "issuer": "...", "client_id": [...], ... }'
      #
      # Required before Vault can be seeded (see 01-prerequisites.md item 41):
      #   - issuer URL          https://<ibm-sso-host>/oidc/endpoint/<realm>
      #   - client_id           IBM SSO application client ID
      #   - client_secret       IBM SSO application client secret
      #   - oidc_client_scope   client-specific scope string
      #   - redirect URIs registered in IBM SSO:
      #       https://inbox-gateway-admin-a.stg.dubai.gov.ae/auth  (callback)
      #       https://inbox-gateway-console-a.stg.dubai.gov.ae      (post-login/logout)
      #
      # IBM SSO groups → Kong RBAC (blueprint §14.2, confirmed Franklin 2026-04-24):
      #   stg1-digital-inbox-SuperAdmin   → super-admin
      #   stg1-digital-inbox-PlatformEditor → read-write
      #   stg1-digital-inbox-PlatformViewer → read-only
      admin_gui_auth: openid-connect
      admin_gui_auth_conf: "{vault://hcv/kong-gateway/idp-conf/admin_gui_auth_conf}"

  admin:
    enabled: true
    type: ClusterIP
    http:
      enabled: false
      servicePort: 8001
      containerPort: 8001
    tls:
      enabled: true
      servicePort: 8444
      containerPort: 8444

  manager:
    enabled: true
    type: ClusterIP
    http:
      enabled: false
      servicePort: 8002
      containerPort: 8002
    tls:
      enabled: true
      servicePort: 8445
      containerPort: 8445

  cluster:
    enabled: true
    tls:
      enabled: true

  clustertelemetry:
    enabled: true
    tls:
      enabled: true

  proxy:
    enabled: false

  portal:
    enabled: false

  portalapi:
    enabled: false

  # ── Replicas and availability (blueprint §12.4.3 — confirmed 2026-05-11) ──────
  # CP does not need HPA — it serves configuration sync only (low, steady load).
  # Scale vertically (resources below) rather than horizontally.
  replicaCount: 1

  podDisruptionBudget:
    enabled: false

  # ── Probe timing (real OpenShift x86_64 nodes) ───────────────────────────────
  # CP startup time on native x86_64: ~30–60 s (migrations + Vault resolution).
  # These values give 2 min total readiness grace and 4.25 min liveness grace —
  # enough for a cold start with a warm Vault and PostgreSQL.
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 10

  # ── Resources (blueprint §12.4.3 — confirmed 2026-05-11) ─────────────────────
  # stg1: 250m/500m CPU, 256Mi/512Mi memory, 1 replica.
  # Burstable QoS: requests < limits allows CPU burst during migrations.
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: kong

  containerSecurityContext:
    enabled: false
