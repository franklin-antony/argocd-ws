apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: kong-gateway
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Kong Gateway CP/DP GitOps — stg1 active

  # Only approved Git/chart sources for Kong Gateway deployments.
  sourceRepos:
    - git@github.com:<YOUR_GITHUB_ORG>/dda-kong-gateway-platform-ops.git
    - https://charts.konghq.com

  # Only approved target namespaces on the in-cluster API server.
  destinations:
    - server: https://kubernetes.default.svc
      namespace: openshift-gitops
    - server: https://kubernetes.default.svc
      namespace: kong-cp-stg1-np
    - server: https://kubernetes.default.svc
      namespace: kong-dp-stg1-np

  # Keep Namespace only if this project creates namespaces (for example via 00-namespaces).
  # If namespaces are pre-created outside Argo CD, change this to: []
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    # Kong Helm chart installs CRDs cluster-wide
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # Kong ClusterPlugin resources
    - group: configuration.konghq.com
      kind: KongClusterPlugin
    # ClusterRole/Binding needed by Kong ingress controller SA
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    # IngressClass is cluster-scoped
    - group: networking.k8s.io
      kind: IngressClass

  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: batch
      kind: Job
    - group: policy
      kind: PodDisruptionBudget
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: cert-manager.io
      kind: Certificate
    - group: route.openshift.io
      kind: Route
    # Kong CRDs (namespaced resources)
    - group: configuration.konghq.com
      kind: "*"
    - group: argoproj.io
      kind: Application
    - group: argoproj.io
      kind: ApplicationSet

  orphanedResources:
    warn: true
